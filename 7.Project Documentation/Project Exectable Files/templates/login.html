<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | SmartLender</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
    .auth-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .auth-box {
      background: #fff; border-radius: 20px;
      padding: 48px 44px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
      width: 100%; max-width: 440px;
    }
    .auth-logo {
      font-size: 1.6rem; font-weight: 800; color: #0f172a;
      margin-bottom: 8px; text-align: center;
    }
    .auth-logo span { color: #3b82f6; }
    .auth-tagline { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 36px; }
    .auth-title { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; text-align: center; }
    .auth-subtitle { text-align: center; color: #64748b; font-size: 0.88rem; margin-bottom: 28px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .field label { font-size: 0.84rem; font-weight: 600; color: #374151; }
    .field input {
      padding: 13px 16px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 0.95rem; color: #0f172a;
      transition: all 0.2s; background: #f8fafc; font-family: inherit;
    }
    .field input:focus { outline: none; border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      transition: all 0.2s; margin-top: 4px; font-family: inherit;
      box-shadow: 0 4px 14px rgba(59,130,246,0.35);
    }
    .btn-login:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); transform: translateY(-1px); }
    .divider {
      text-align: center; color: #94a3b8; font-size: 0.82rem;
      margin: 20px 0; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: #e2e8f0;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .signup-link {
      text-align: center; color: #64748b; font-size: 0.9rem; margin-top: 4px;
    }
    .signup-link a { color: #3b82f6; font-weight: 600; text-decoration: none; }
    .signup-link a:hover { text-decoration: underline; }
    .alert-error {
      background: #fff1f2; color: #9f1239; padding: 12px 16px;
      border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px;
      border-left: 4px solid #f43f5e; display: flex; align-items: center; gap: 8px;
    }
    .info-note {
      background: #eff6ff; border: 1px dashed #93c5fd;
      padding: 12px 16px; border-radius: 10px;
      font-size: 0.8rem; color: #1e40af;
      margin-top: 18px; text-align: center; line-height: 1.5;
    }
    .back-home { display: block; text-align: center; margin-top: 20px; color: #64748b; font-size: 0.85rem; text-decoration: none; }
    .back-home:hover { color: #3b82f6; }
    header { display: none; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">Smart<span>Lender</span></div>
      <div class="auth-tagline">Your Trusted Loan Eligibility Platform</div>

      <h2 class="auth-title">Welcome Back! 👋</h2>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      {% if error %}
      <div class="alert-error">⚠️ {{ error }}</div>
      {% endif %}

      <form action="{{ url_for('login') }}" method="POST">
        <div class="field">
          <label for="username">Your Name / Username</label>
          <input type="text" name="username" id="username" placeholder="e.g. Ramesh Kumar" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Sign In &rarr;</button>
      </form>

      <div class="divider">or</div>

      <div class="signup-link">
        Don't have an account? <a href="{{ url_for('signup') }}">Create one free &rarr;</a>
      </div>

      <div class="info-note">
        💡 Sign Up first if you do not have an account. Your credentials will be saved securely.
      </div>

      <a href="{{ url_for('home') }}" class="back-home">← Back to Home</a>
    </div>
  </div>
</body>
</html>
